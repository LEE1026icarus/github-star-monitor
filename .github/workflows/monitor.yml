name: GitHub Star Surge Monitor

on:
  schedule:
    # 1일 2회 실행 (KST 10:00 = UTC 01:00, KST 22:00 = UTC 13:00)
    - cron: '0 1,13 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout monitor repo
        uses: actions/checkout@v4

      - name: Checkout results repo
        uses: actions/checkout@v4
        with:
          repository: LEE1026icarus/ai-team-results
          path: results-repo
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RESULTS_REPO_PATH: ${{ github.workspace }}/results-repo
          TRENDING_LIMIT: '30'
          TOP_N: '10'
        run: |
          # Git config for committing to results repo
          git -C "$RESULTS_REPO_PATH" config user.name "github-actions[bot]"
          git -C "$RESULTS_REPO_PATH" config user.email "github-actions[bot]@users.noreply.github.com"
          python scripts/monitor.py
